apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: devops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: guiihermecardoso/devops-backend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/devops